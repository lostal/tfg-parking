services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: seven_suite
      POSTGRES_PASSWORD: seven_suite_dev
      POSTGRES_DB: seven_suite
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seven_suite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
